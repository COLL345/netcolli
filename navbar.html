<!DOCTYPE HTML>

    <style>
        *{
            margin: 0;
            padding: 0;
            //background-color: #071352;
            box-sizing: border-box;
            background: linear-gradient(to right rgb(3, 3, 66)50%,red);
        }
        body{
  width: 100%;
  height: 100vh;
  background: linear-gradient(
    to right,
    rgb(54, 3, 11) 0%,
    rgb(55, 12, 156) ,
    rgb(11, 187, 187)50% ,
    rgb(132, 181, 7) 100%
  );
}
        li,a,button{
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-weight: 500;
            font-size: 16px;
            color: #edfef1;
            text-decoration: none;
           
          
        }
        header{
            display: flex;
            flex-direction: row;
            justify-content: flex-end;
            align-items: center;
            padding: 30px 10%;
          
        }
        .logo{order: 3;
            cursor: pointer;
            width: 50px;
            margin-left: auto;
           //margin-right: auto;}

           nav{
            order: 1;
           }       

        .navlinks{list-style: none;
            

        }
        .navlinks li{
           
            padding: 0px 20px; 
            display: inline-block;
        }
        .navlinks li:nth-child(1) {
           
           padding: 0px 20px 0 0; 
           
       }
        .navlinks li a{
            transition: all 0.3s ease 0s;

        }
        .navlinks li a:hover{
            color: #0008a9;
        }

        button{
            padding: 9px 25px;
            background-color: rgba(0, 136, 169, 1);
            border: none;
            border-radius: 50px;
            cursor:pointer;
            transition: all 0.3s ease 0s;
            margin-left: 20px;
            margin-top: 20px;

        }
        button:hover{
            background-color: rgba(0, 136, 169, 0.8);
        }
        h6{
            display: inline;
            margin-right: 600px;
            font-size: 30px;
          
        }
        .intro{
            background-position: top 25% right 0;
            align-items: flex-start;
            justify-content: center;
            display: flex;
            flex-direction: column;
            margin: 0px 70px  80px 200px;
        }
    .intro h1,h2,p{
        margin-bottom: 2px;
    }
    .intro p{

    }
.social-icons{
    margin: 20px 0;

}
.social-icons a{
    border: 1px solid #ccc;
    border-radius: 20px;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    margin: 0 3px;
    width: 40px;
    height: 40px;
}

    </style>
